# Extra env variables
# env = MY_GLOBAL_ENV,setting

# Promote ~/.local/bin ahead of ~/.local/share/omarchy/bin so user shadows of
# omarchy commands (e.g. omarchy-launch-screensaver) win in graphical-session
# contexts (walker/menu spawns), matching interactive shell PATH order.
env = PATH,/home/thony/.local/bin:/home/thony/.local/share/mise/shims:/home/thony/.local/share/omarchy/bin:/home/thony/.emacs.d/bin:/home/thony/.nix-profile/bin:/nix/var/nix/profiles/default/bin:/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/lib/jvm/default/bin:/usr/bin/site_perl:/usr/bin/vendor_perl:/usr/bin/core_perl
